<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <nav>
            <button id="homeTab">Home</button>
            <button id="menuTab">Menu</button>
            <button id="aboutTab">About</button>
        </nav>
    </header>
    <div id="content"></div>

    <footer>
        <p>&copy; 2024 Rhex Niebres. All rights reserved.</p>
    </footer>
    <script type="module">

        import loadHome from './homeTab.js';
        import loadAbout from './aboutTab.js';
        import loadMenu from './menuTab.js';
        
        const content = document.getElementById('content');

        const homeTab = document.getElementById('homeTab');
        homeTab.addEventListener('click',()=>{
            content.textContent='';
            loadHome(content)
        });

        const aboutTab = document.getElementById('aboutTab');
        aboutTab.addEventListener('click',()=>{
            content.textContent='';
            loadAbout(content)
        });

        const menuTab = document.getElementById('menuTab');
        menuTab.addEventListener('click',()=>{
            content.textContent='';
            loadMenu(content)
        });


        document.addEventListener('DOMContentLoaded', () => { 
    loadHome(content);
});
//load home content by defualt
    </script>
</body>
</html>
